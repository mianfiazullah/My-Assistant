<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Assistant</title>
    <script>
      // Early interception for MetaMask/Web3 extension errors
      (function() {
        const originalFetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function(val) { 
              // Silently ignore attempts to overwrite fetch
              return; 
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          // If we can't redefine it, we'll fall back to the error handlers below
        }
      })();

      const originalConsoleError = console.error;
      window.process = { env: {}, emit: function() {}, version: "v18.0.0", nextTick: function(cb) { setTimeout(cb, 0); } };
      console.error = function() {
        const msg = Array.from(arguments).join(' ');
        if (msg.includes('Cannot set property fetch of #<Window>') || 
            msg.includes('MetaMask') || 
            msg.includes('inpage.js')) {
          return;
        }
        originalConsoleError.apply(console, arguments);
      };
      window.addEventListener('error', function(e) {
        if (e.message && (e.message.includes('Cannot set property fetch') || e.message.includes('MetaMask'))) {
          e.preventDefault();
          e.stopPropagation();
          return;
        }
        // Only show red banner for actual script errors, not resource loading errors
        if (!(e instanceof ErrorEvent)) return;
        
        const errorDiv = document.createElement('div');
        errorDiv.style.position = 'fixed';
        errorDiv.style.top = '0';
        errorDiv.style.left = '0';
        errorDiv.style.width = '100%';
        errorDiv.style.backgroundColor = 'rgba(255, 0, 0, 0.8)';
        errorDiv.style.color = 'white';
        errorDiv.style.padding = '10px';
        errorDiv.style.zIndex = '999999';
        errorDiv.textContent = 'Error: ' + (e.message || 'Unknown') + ' at ' + (e.filename || 'unknown') + ':' + (e.lineno || '0');
        document.body.appendChild(errorDiv);
      }, true);
      
      window.addEventListener('unhandledrejection', function(e) {
        if (e.reason && e.reason.message && (
            e.reason.message.includes('Cannot set property fetch') || 
            e.reason.message.includes('MetaMask') ||
            e.reason.message.includes('WebSocket closed without opened')
        )) {
          e.preventDefault();
          e.stopPropagation();
          return;
        }
        if (e.reason === 'WebSocket closed without opened.' || (e.reason && e.reason.message === 'WebSocket closed without opened.')) {
          e.preventDefault();
          e.stopPropagation();
          return;
        }
        const errorDiv = document.createElement('div');
        errorDiv.style.position = 'fixed';
        errorDiv.style.top = '0';
        errorDiv.style.left = '0';
        errorDiv.style.width = '100%';
        errorDiv.style.backgroundColor = 'rgba(255, 0, 0, 0.8)';
        errorDiv.style.color = 'white';
        errorDiv.style.padding = '10px';
        errorDiv.style.zIndex = '999999';
        errorDiv.textContent = 'Unhandled Rejection: ' + (e.reason ? (e.reason.message || e.reason) : 'Unknown reason');
        document.body.appendChild(errorDiv);
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
